<!DOCTYPE html>
<html lang="en">
<head>
    <title>Smart Parking Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body onload="refreshGrid()">
    <div class="sidebar">
        <h2>🅿️ Parking Panel</h2>
        <div id="stats-card" class="card">
            <p>Total Revenue: <span id="revenue">₹0</span></p>
            <p>Available: <span id="avail-count">12</span></p>
        </div>
        <button onclick="window.print()">Print Report</button>
    </div>

    <div class="main-content">
        <div id="slot-grid" class="grid"></div>
    </div>

    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <h3>Book Slot #<span id="target-slot"></span></h3>
            <input type="text" id="owner" placeholder="Owner Name">
            <input type="text" id="v_no" placeholder="Vehicle Number (e.g. DL 1C 1234)">
            <button class="btn-confirm" onclick="submitBooking()">Confirm & Generate QR</button>
        </div>
    </div>
</body>
<script>
    // Frontend logic jo Python API se baat karegi
    async function refreshGrid() {
        const res = await axios.get('/api/slots');
        const booked = res.data;
        const grid = document.getElementById('slot-grid');
        grid.innerHTML = '';

        for(let i=1; i<=12; i++) {
            const isBooked = booked[i];
            grid.innerHTML += `
                <div class="slot ${isBooked ? 'booked' : 'free'}" onclick="handleSlot(${i}, ${JSON.stringify(isBooked)})">
                    Slot ${i} <br> ${isBooked ? isBooked.vehicle : 'FREE'}
                </div>
            `;
        }
    }
</script>
</html>
